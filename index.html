<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOLAVAN - Creative Research Lab</title>
    <meta name="description" content="VOLAVAN is a creative research lab in rural Friuli. Artist residencies, workshops, and collaborative projects immersed in nature." />
  </head>
  <body>
    <div id="root"></div>
    <!-- Dev-only: proxy Sanity XHR through Vite to bypass CORS -->
    <script>
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        var _xhrOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
          if (typeof url === 'string' && url.indexOf('98dco624.api.sanity.io') !== -1) {
            arguments[1] = url.replace('https://98dco624.api.sanity.io', '/sanity-api');
          }
          return _xhrOpen.apply(this, arguments);
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
